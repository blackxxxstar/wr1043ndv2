name: Build OpenWrt 19.07.10 TL-WR1043ND v2 Minimal Router

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            xz-utils \
            ca-certificates \
            libssl-dev \
            zlib1g-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libbz2-dev \
            libgdbm-dev \
            libffi-dev \
            liblzma-dev \
            tk-dev \
            uuid-dev

      - name: Build Python 2.7.18 for ImageBuilder
        run: |
          set -euxo pipefail

          curl -LO https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xzf Python-2.7.18.tgz
          cd Python-2.7.18

          ./configure --prefix=/opt/python2
          make -j"$(nproc)"
          sudo make altinstall

          sudo ln -sf /opt/python2/bin/python2.7 /usr/local/bin/python
          sudo ln -sf /opt/python2/bin/python2.7 /usr/local/bin/python2

          python --version

      - name: Download OpenWrt ImageBuilder
        run: |
          set -euxo pipefail

          curl -L \
            -o openwrt-imagebuilder.tar.xz \
            https://archive.openwrt.org/releases/19.07.10/targets/ath79/generic/openwrt-imagebuilder-19.07.10-ath79-generic.Linux-x86_64.tar.xz

          tar -xf openwrt-imagebuilder.tar.xz
          mv openwrt-imagebuilder-19.07.10-ath79-generic.Linux-x86_64 ib

      - name: Prepare default WAN and Wi-Fi config
        run: |
          set -euxo pipefail

          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-default-config <<'EOF'
          #!/bin/sh
          set -e

          uci -q set network.wan.proto='dhcp'
          uci -q commit network

          uci -q set wireless.@wifi-device[0].disabled='0'
          uci -q set wireless.@wifi-iface[0].device='radio0'
          uci -q set wireless.@wifi-iface[0].mode='ap'
          uci -q set wireless.@wifi-iface[0].network='lan'
          uci -q set wireless.@wifi-iface[0].ssid='TP-Link TL-WR1043ND'
          uci -q set wireless.@wifi-iface[0].encryption='none'
          uci -q delete wireless.@wifi-iface[0].key 2>/dev/null || true
          uci -q commit wireless

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-default-config

      - name: Build firmware
        run: |
          set -euxo pipefail
          cd ib
          PATH="/opt/python2/bin:$PATH" make image \
            PROFILE="tplink_tl-wr1043nd-v2" \
            FILES="../files" \
            PACKAGES="luci wpad-basic dnsmasq firewall \
            -ppp -ppp-mod-pppoe -ppp-mod-pptp -kmod-ppp \
            -odhcp6c -ip6tables -kmod-ipv6 \
            -kmod-usb-core -kmod-usb2 -kmod-usb-ohci -kmod-usb-uhci -usbutils"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-19.07.10-tl-wr1043nd-v2
          path: ib/bin/targets/ath79/generic/*
          if-no-files-found: error
