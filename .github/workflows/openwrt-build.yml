name: Build OpenWrt 19.07.10 TL-WR1043ND v2 Minimal Router

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils ca-certificates

      - name: Download OpenWrt ImageBuilder
        run: |
          set -euxo pipefail

          curl -L \
            -o openwrt-imagebuilder.tar.xz \
            https://archive.openwrt.org/releases/19.07.10/targets/ath79/generic/openwrt-imagebuilder-19.07.10-ath79-generic.Linux-x86_64.tar.xz

          tar -xf openwrt-imagebuilder.tar.xz

          mv openwrt-imagebuilder-19.07.10-ath79-generic.Linux-x86_64 ib

      - name: Create default first boot config
        run: |
          set -euxo pipefail

          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-default-config <<'EOF'
          #!/bin/sh
          set -e

          # WAN via DHCP from ISP
          uci set network.wan.proto='dhcp'
          uci commit network

          # Enable Wi-Fi AP
          uci set wireless.@wifi-device[0].disabled='0'
          uci set wireless.@wifi-iface[0].device='radio0'
          uci set wireless.@wifi-iface[0].mode='ap'
          uci set wireless.@wifi-iface[0].network='lan'
          uci set wireless.@wifi-iface[0].ssid='TP-Link TL-WR1043ND'
          uci set wireless.@wifi-iface[0].encryption='none'
          uci -q delete wireless.@wifi-iface[0].key

          uci commit wireless

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-default-config

      - name: Build firmware
        run: |
          cd ib

          make image \
            PROFILE="tplink_tl-wr1043nd-v2" \
            FILES="../files" \
            PACKAGES="luci wpad-basic dnsmasq firewall \
            -ppp -ppp-mod-pppoe -ppp-mod-pptp -kmod-ppp \
            -odhcp6c -ip6tables -kmod-ipv6 \
            -kmod-usb-core -kmod-usb2 -kmod-usb-ohci -kmod-usb-uhci -usbutils"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-19.07.10-tl-wr1043nd-v2
          path: ib/bin/targets/ath79/generic/*
          if-no-files-found: error
